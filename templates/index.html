<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Portal</title>
    <style>
   body { 
    font-family: sans-serif; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    
    /* This creates a semi-transparent dark overlay to make the image appear more 'opaque' */
    background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                url('/static/first-image.png');
    
    background-size: cover; 
    background-position: center;
    background-repeat: no-repeat;
}

        .card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px; 
            border-radius: 16px; 
            width: 400px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: black;
        }

        .hidden { display: none !important; }

        input { 
            width: 100%; padding: 12px; margin-bottom: 12px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: black;
        }

        input::placeholder { color: black; }

        button { 
            width: 100%; padding: 12px; margin-top: 5px; cursor: pointer; 
            background: rgba(255, 255, 255, 0.2); border: none; border-radius: 8px;
            color: black; font-weight: bold; transition: 0.3s;
        }

        button:hover { background: rgba(105, 243, 105, 0.3); }

        .logout-btn { background-color: rgba(217, 83, 79, 0.8); }
        .logout-btn:hover { background-color: rgba(217, 83, 79, 1); }

        .back-link { 
            display: block; margin-top: 15px; cursor: pointer; text-decoration: underline; 
            color: black; font-size: 0.9em;
        }

        ul { list-style: none; padding: 0; }
        li { background: rgba(0,0,0,0.1); margin-bottom: 5px; padding: 10px; border-radius: 5px; }
        a { color: black; text-decoration: none; }
    </style>
</head>
<body>

    <main>
        <div id="welcomeCard" class="card">
            <h2>Welcome to our points system Portal:</h2>
            <button onclick="showRegister()">Register</button>
            <button onclick="showLoginState()">Login</button>
        </div>

        <div id="registerCard" class="card hidden">
            <h2>Register</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="tel" id="phone" placeholder="Phone" required>
                <input type="date" id="dob" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Submit</button>
            </form>
            <span class="back-link" onclick="goBack()">← Back</span>
        </div>

        <div id="uploadCard" class="card hidden">
            <h2 id="portalTitle">Login</h2>
            <form id="loginForm" onsubmit="handlePortalLogin(event)">
                <input type="text" id="userNumber" placeholder="User ID" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <form id="receiptUploadForm" class="hidden" onsubmit="handleUpload(event)">
                <input type="file" id="fileUpload" required>
                <input type="number" id="amount" placeholder="Total Amount" required>
                <button type="submit">Upload Receipt</button>
            </form>
            <span id="backActionLink" class="back-link" onclick="goBackOrLogout()">← Back</span>
        </div>

        <div id="dashboardCard" class="card hidden">
            <h2 id="welcomeBackMsg">Welcome back!</h2>
            <ul id="receiptList"></ul>
            <h3>Points: <span id="totalPoints">0</span></h3>
            <button onclick="showUploadState()">Upload More</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
            <div id="navBar">
                <button onclick="showProfileModal()">Edit Profile</button>
            </div>
        </div>

        <div id="profileModal" class="card hidden" style="position:fixed; top:20%;">
            <h3>Edit Profile</h3>
            <form onsubmit="handleUpdateProfile(event)">
                <input type="email" id="editEmail" placeholder="New Email">
                <input type="tel" id="editPhone" placeholder="New Phone">
                <button type="submit">Save</button>
                <button type="button" onclick="closeProfileModal()">Cancel</button>
            </form>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'https://receipt-portal-backend.onrender.com';
        let currentUserId = null;
        let currentUserName = "";

        async function safeFetch(url, options) {
            try {
                const res = await fetch(url, options);
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.message || 'Request failed');
                return data;
            } catch (err) { alert(err.message); throw err; }
        }

        function showRegister() { document.getElementById('welcomeCard').classList.add('hidden'); document.getElementById('registerCard').classList.remove('hidden'); }
        function goBack() { document.querySelectorAll('.card').forEach(c => c.classList.add('hidden')); document.getElementById('welcomeCard').classList.remove('hidden'); }
        function showLoginState() { document.getElementById('welcomeCard').classList.add('hidden'); document.getElementById('uploadCard').classList.remove('hidden'); document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('receiptUploadForm').classList.add('hidden'); }
        function showUploadState() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('dashboardCard').classList.add('hidden'); document.getElementById('uploadCard').classList.remove('hidden'); document.getElementById('receiptUploadForm').classList.remove('hidden'); }
        
        function logout() { 
            currentUserId = null; currentUserName = ""; 
            document.getElementById('receiptUploadForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            goBack(); 
        }
        function goBackOrLogout() { currentUserId ? logout() : goBack(); }

        async function handleRegister(e) {
            e.preventDefault();
            await safeFetch(`${API_BASE_URL}/api/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: document.getElementById('name').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, dob: document.getElementById('dob').value, password: document.getElementById('password').value })});
            alert('Registration Successful!'); goBack();
        }

        async function handlePortalLogin(e) {
            e.preventDefault();
            const data = await safeFetch(`${API_BASE_URL}/api/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userNumber: document.getElementById('userNumber').value, password: document.getElementById('loginPassword').value })});
            currentUserId = data.user_id; currentUserName = data.name;
            document.getElementById('welcomeBackMsg').innerText = `Welcome back, ${currentUserName}!`;
            await loadDashboard(currentUserId);
        }

        async function handleUpload(e) {
            e.preventDefault();
            const fileInput = document.getElementById('fileUpload');
            if (!fileInput.files[0]) return alert('Please select a file.');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('user_id', currentUserId);
            formData.append('total_amount', document.getElementById('amount').value);
            
            const btn = e.target.querySelector('button');
            btn.innerText = "Uploading..."; btn.disabled = true;
            try {
                await safeFetch(`${API_BASE_URL}/api/upload`, { method: 'POST', body: formData });
                alert('Success'); document.getElementById('receiptUploadForm').reset();
                await loadDashboard(currentUserId);
            } finally { btn.innerText = "Upload Receipt"; btn.disabled = false; }
        }

        async function loadDashboard(uid) {
            const data = await safeFetch(`${API_BASE_URL}/api/dashboard/${uid}`);
            const list = document.getElementById('receiptList');
            list.innerHTML = data.receipts.map(r => `<li><a href="${API_BASE_URL}/api/download/${r.file_name}" target="_blank">${r.date || 'N/A'} - R${r.total_amount} - ${r.points_earned} pts</a></li>`).join('');
            document.getElementById('totalPoints').innerText = data.total_points;
            document.getElementById('uploadCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');
        }

        async function handleUpdateProfile(e) {
            e.preventDefault();
            await safeFetch(`${API_BASE_URL}/api/update-profile`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: currentUserId, email: document.getElementById('editEmail').value, phone: document.getElementById('editPhone').value })});
            closeProfileModal(); alert('Updated'); await loadDashboard(currentUserId);
        }

        function showProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
    </script>
</body>
</html>
